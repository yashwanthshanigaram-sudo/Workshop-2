<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.15);
            --card-border: rgba(255, 255, 255, 0.4);
            --input-bg: rgba(255, 255, 255, 0.16);
            --button-bg: #ffffff;
            --button-color: #0f4fc1;
            --text-light: rgba(255, 255, 255, 0.88);
            --text-muted: rgba(255, 255, 255, 0.72);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #71c7ff 0%, transparent 30%),
                        radial-gradient(circle at bottom right, #185dff 0%, transparent 25%),
                        linear-gradient(180deg, #3f8eff 0%, #1150b1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            width: min(360px, 95vw);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid var(--card-border);
            box-shadow: 0 24px 90px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(28px);
            overflow: hidden;
        }

        .card-body {
            padding: 28px 24px 24px;
        }

        .top-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .weather-icon {
            width: 84px;
            height: 84px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.22);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .weather-icon img {
            width: 48px;
            height: 48px;
        }

        .temp-block {
            text-align: right;
        }

        .temp-block .temp {
            font-size: 3.5rem;
            margin: 0;
            line-height: 0.9;
        }

        .temp-block .degree {
            font-size: 1.1rem;
            margin-left: 6px;
            vertical-align: super;
        }

        .section-title {
            margin: 24px 0 8px;
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .details {
            display: grid;
            gap: 6px;
        }

        .details .city {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .details .state {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
            text-transform: capitalize;
        }

        .info-grid {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 20px;
        }

        .info-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 22px;
            padding: 16px 14px;
            text-align: center;
            min-height: 86px;
        }

        .info-card span {
            display: block;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: #f8fbff;
        }

        .info-card p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .search-box {
            margin-top: 22px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            border: none;
            border-radius: 24px;
            padding: 16px 18px;
            font-size: 1rem;
            outline: none;
            background: var(--input-bg);
            color: white;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.72);
        }

        .search-box button {
            border: none;
            border-radius: 24px;
            padding: 0 22px;
            font-size: 1rem;
            min-width: 92px;
            background: var(--button-bg);
            color: var(--button-color);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
        }

        .search-box button:hover {
            transform: translateY(-1px);
        }

        .forecast {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 22px;
            padding: 14px 10px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .forecast-day div {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .forecast-day img {
            width: 36px;
            height: 36px;
            margin: 8px auto;
        }

        .forecast-day strong {
            display: block;
            margin-top: 6px;
            font-size: 0.95rem;
            color: white;
        }

        .error-message {
            margin-top: 18px;
            padding: 16px 18px;
            border-radius: 20px;
            background: rgba(121, 71, 255, 0.18);
            color: #f4efff;
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-body">
        <div class="top-panel">
            <div class="weather-icon" id="weatherIcon">
                <img src="https://openweathermap.org/img/wn/01d@2x.png" alt="weather icon">
            </div>
            <div class="temp-block">
                <p class="temp" id="tempValue">--<span class="degree">°</span></p>
                <p class="time" id="timeValue">--:--</p>
            </div>
        </div>

        <div class="details">
            <p class="city" id="cityName">Search a city</p>
            <p class="state" id="weatherState">Clear Day</p>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <p>Humidity</p>
                <span id="humidityValue">--%</span>
            </div>
            <div class="info-card">
                <p>Wind</p>
                <span id="windValue">-- m/s</span>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="city" placeholder="Hyderabad">
            <button onclick="getWeather()">Search</button>
        </div>

        <div class="forecast" id="forecastRow">
            <div class="forecast-day">
                <div>THU</div>
                <img src="https://openweathermap.org/img/wn/01d.png" alt="sunny">
                <strong>18/20</strong>
            </div>
            <div class="forecast-day">
                <div>FRI</div>
                <img src="https://openweathermap.org/img/wn/11d.png" alt="storm">
                <strong>18/20</strong>
            </div>
            <div class="forecast-day">
                <div>SAT</div>
                <img src="https://openweathermap.org/img/wn/09d.png" alt="rain">
                <strong>18/20</strong>
            </div>
            <div class="forecast-day">
                <div>SUN</div>
                <img src="https://openweathermap.org/img/wn/03d.png" alt="cloudy">
                <strong>18/20</strong>
            </div>
        </div>

        <div id="errorMessage" class="error-message" style="display:none;"></div>
    </div>
</div>

<script>
    async function getWeather() {
        const city = document.getElementById('city').value.trim();
        const apiKey = 'YOUR_API_KEY_HERE'; // Replace with your OpenWeatherMap API key
        const errorElement = document.getElementById('errorMessage');

        errorElement.style.display = 'none';
        errorElement.textContent = '';

        if (!city) {
            errorElement.textContent = 'Please enter a city name.';
            errorElement.style.display = 'block';
            return;
        }

        if (apiKey === 'YOUR_API_KEY_HERE') {
            errorElement.textContent = 'Please replace YOUR_API_KEY_HERE with your OpenWeatherMap API key.';
            errorElement.style.display = 'block';
            return;
        }

        const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`;

        try {
            const response = await fetch(weatherUrl);
            const data = await response.json();

            if (!response.ok) {
                errorElement.textContent = data.message ? data.message : 'City not found!';
                errorElement.style.display = 'block';
                return;
            }

            updateCurrentWeather(data);
            fetchForecast(data.coord.lat, data.coord.lon, apiKey);
        } catch (error) {
            errorElement.textContent = 'Unable to fetch weather data. Check your internet connection.';
            errorElement.style.display = 'block';
        }
    }

    function updateCurrentWeather(data) {
        const iconCode = data.weather[0].icon;
        const description = data.weather[0].description;
        const temp = Math.round(data.main.temp);
        const humidity = data.main.humidity;
        const wind = data.wind.speed;
        const cityName = `${data.name}, ${data.sys.country}`;
        const timeString = new Date(data.dt * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        document.getElementById('weatherIcon').innerHTML = `<img src="https://openweathermap.org/img/wn/${iconCode}@2x.png" alt="Weather icon">`;
        document.getElementById('tempValue').textContent = `${temp}°`;
        document.getElementById('cityName').textContent = cityName;
        document.getElementById('weatherState').textContent = description;
        document.getElementById('humidityValue').textContent = `${humidity}%`;
        document.getElementById('windValue').textContent = `${wind} m/s`;
        document.getElementById('timeValue').textContent = timeString;
    }

    async function fetchForecast(lat, lon, apiKey) {
        const forecastUrl = `https://api.openweathermap.org/data/2.5/onecall?lat=${lat}&lon=${lon}&exclude=current,minutely,hourly,alerts&units=metric&appid=${apiKey}`;

        try {
            const response = await fetch(forecastUrl);
            const data = await response.json();
            if (!response.ok) return;

            const forecastRow = document.getElementById('forecastRow');
            forecastRow.innerHTML = data.daily.slice(1, 5).map(day => {
                const dayName = new Date(day.dt * 1000).toLocaleDateString(undefined, { weekday: 'short' }).toUpperCase();
                const icon = day.weather[0].icon;
                const max = Math.round(day.temp.max);
                const min = Math.round(day.temp.min);

                return `
                    <div class="forecast-day">
                        <div>${dayName}</div>
                        <img src="https://openweathermap.org/img/wn/${icon}.png" alt="${day.weather[0].description}">
                        <div>${min}/${max}</div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            // do nothing if forecast fails
        }
    }
</script>

</body>
</html>
